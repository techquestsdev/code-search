apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "code-search.fullname" . }}-env
  labels:
    {{- include "code-search.labels" . | nindent 4 }}
data:
  {{- if .Values.sharding.enabled }}
  # With sharding, query all zoekt pods via headless service DNS
  # Each pod in the StatefulSet gets a DNS entry: <podname>.<headless-service>.<namespace>.svc
  # We generate: zoekt-0.code-search-zoekt-headless:6070,zoekt-1.code-search-zoekt-headless:6070,...
  CS_ZOEKT_SHARDS: {{ include "code-search.zoektShardUrls" . | quote }}
  CS_SHARDING_ENABLED: "true"
  CS_SHARDING_TOTAL_SHARDS: {{ .Values.sharding.replicas | quote }}
  {{- if .Values.sharding.federatedAccess.enabled }}
  CS_SHARDING_FEDERATED_ACCESS: "true"
  CS_SHARDING_INDEXER_API_PORT: {{ .Values.sharding.federatedAccess.indexerAPIPort | quote }}
  CS_SHARDING_INDEXER_SERVICE: {{ include "code-search.fullname" . }}-indexer-headless
  {{- end }}
  {{- end }}
  CS_ZOEKT_URL: "http://{{ include "code-search.fullname" . }}-zoekt:{{ .Values.zoekt.service.port }}"
  CS_SERVER_ADDR: ":8080"
---
{{- if .Values.config.inline }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "code-search.fullname" . }}-config
  labels:
    {{- include "code-search.labels" . | nindent 4 }}
data:
  config.yaml: |
    {{- .Values.config.inline | nindent 4 }}
{{- end }}
