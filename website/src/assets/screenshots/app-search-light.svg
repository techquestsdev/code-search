<svg viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg"><rect width="1200" height="700" rx="12" fill="#fff" stroke="#e5e7eb"/><rect width="1200" height="40" rx="12" fill="#f3f4f6"/><path fill="#f3f4f6" d="M0 28h1200v12H0z"/><circle cx="20" cy="20" r="6" fill="#ff5f56"/><circle cx="40" cy="20" r="6" fill="#ffbd2e"/><circle cx="60" cy="20" r="6" fill="#27c93f"/><rect x="300" y="10" width="600" height="20" rx="4" fill="#fff" stroke="#d1d5db"/><text x="600" y="24" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">localhost:3000</text><path fill="#fff" d="M0 40h1200v56H0z"/><path stroke="#e5e7eb" d="M0 96h1200"/><g stroke="#2563eb" stroke-width="2.5" stroke-linecap="round" fill="none"><path d="m53 63-5 6 5 6m8-12 5 6-5 6" stroke-linejoin="round"/><path d="m59 61-4 16"/></g><text x="80" y="76" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#111827">Code Search</text><rect x="720" y="56" width="72" height="32" rx="8" fill="#eff6ff"/><text x="756" y="78" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#1d4ed8" text-anchor="middle">Search</text><text x="830" y="78" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#4b5563">Replace</text><text x="920" y="78" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#4b5563">Repositories</text><text x="1020" y="78" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#4b5563">Connections</text><text x="1110" y="78" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#4b5563">Jobs</text><circle cx="1160" cy="73" r="8" fill="none" stroke="#9ca3af" stroke-width="1.5"/><path fill="#fff" d="M0 96h1200v604H0z"/><g stroke="#2563eb" stroke-width="4" stroke-linecap="round" fill="none"><path d="m462 155-8 8 8 8m16-16 8 8-8 8" stroke-linejoin="round"/><path d="m474 151-8 24"/></g><text x="605" y="175" font-family="system-ui, sans-serif" font-size="34" font-weight="700" fill="#111827" text-anchor="middle">Code Search</text><text x="600" y="200" font-family="system-ui, sans-serif" font-size="14" fill="#6b7280" text-anchor="middle">Search across your repositories with Zoekt</text><rect x="200" y="220" width="680" height="44" rx="8" fill="#fff" stroke="#d1d5db"/><text x="230" y="248" font-family="system-ui, sans-serif" font-size="14" fill="#9ca3af">Search code... (type repo:, lang:, file: for filters)</text><rect x="890" y="224" width="80" height="36" rx="8" fill="none" stroke="#3b82f6"/><text x="930" y="248" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#2563eb" text-anchor="middle">Search</text><text x="205" y="288" font-family="system-ui, sans-serif" font-size="13" fill="#2563eb">More options ↓</text><text x="600" y="340" font-family="system-ui, sans-serif" font-size="16" font-weight="500" fill="#374151" text-anchor="middle">How to search</text><text x="280" y="380" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#2563eb">Search in files or paths</text><text x="280" y="410" font-family="SF Mono, Consolas, monospace" font-size="12" fill="#1f2937">foo bar</text><text x="360" y="410" font-family="system-ui, sans-serif" font-size="12" fill="#6b7280">(both foo and bar)</text><text x="280" y="435" font-family="SF Mono, Consolas, monospace" font-size="12" fill="#1f2937">foo or bar</text><text x="370" y="435" font-family="system-ui, sans-serif" font-size="12" fill="#6b7280">(either foo or bar)</text><text x="280" y="460" font-family="SF Mono, Consolas, monospace" font-size="12" fill="#1f2937">&quot;exit boot&quot;</text><text x="380" y="460" font-family="system-ui, sans-serif" font-size="12" fill="#6b7280">(exact match)</text><text x="280" y="485" font-family="SF Mono, Consolas, monospace" font-size="12" fill="#1f2937">FOO</text><text x="315" y="485" font-family="SF Mono, Consolas, monospace" font-size="12" fill="#f97316">case:yes</text><text x="395" y="485" font-family="system-ui, sans-serif" font-size="12" fill="#6b7280">(case sensitive)</text><text x="280" y="510" font-family="SF Mono, Consolas, monospace" font-size="12" fill="#a855f7">/foo(bar|baz)/</text><text x="380" y="510" font-family="system-ui, sans-serif" font-size="12" fill="#6b7280">(regular expression)</text><text x="680" y="380" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#2563eb">Filter results</text><text x="680" y="410" font-family="SF Mono, Consolas, monospace" font-size="12" fill="#06b6d4">file:</text><text x="720" y="410" font-family="SF Mono, Consolas, monospace" font-size="12" fill="#1f2937">README</text><text x="785" y="410" font-family="system-ui, sans-serif" font-size="12" fill="#6b7280">(by filename)</text><text x="680" y="435" font-family="SF Mono, Consolas, monospace" font-size="12" fill="#06b6d4">repo:</text><text x="725" y="435" font-family="SF Mono, Consolas, monospace" font-size="12" fill="#1f2937">org/repo</text><text x="790" y="435" font-family="system-ui, sans-serif" font-size="12" fill="#6b7280">(by repo)</text><text x="680" y="460" font-family="SF Mono, Consolas, monospace" font-size="12" fill="#06b6d4">lang:</text><text x="725" y="460" font-family="SF Mono, Consolas, monospace" font-size="12" fill="#1f2937">go</text><text x="770" y="460" font-family="system-ui, sans-serif" font-size="12" fill="#6b7280">(by language)</text><text x="680" y="485" font-family="SF Mono, Consolas, monospace" font-size="12" fill="#06b6d4">branch:</text><text x="740" y="485" font-family="SF Mono, Consolas, monospace" font-size="12" fill="#1f2937">main</text><text x="780" y="485" font-family="system-ui, sans-serif" font-size="12" fill="#6b7280">(by branch)</text><text x="280" y="550" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#d97706">Advanced</text><text x="280" y="580" font-family="SF Mono, Consolas, monospace" font-size="12" fill="#06b6d4">file:</text><text x="310" y="580" font-family="SF Mono, Consolas, monospace" font-size="12" fill="#1f2937">\.ts$</text><text x="375" y="580" font-family="system-ui, sans-serif" font-size="12" fill="#6b7280">(files that end in &quot;.ts&quot;)</text><text x="280" y="605" font-family="SF Mono, Consolas, monospace" font-size="12" fill="#1f2937">todo </text><text x="315" y="605" font-family="SF Mono, Consolas, monospace" font-size="12" fill="#f87171">-lang:</text><text x="356" y="605" font-family="SF Mono, Consolas, monospace" font-size="12" fill="#1f2937">go</text><text x="395" y="605" font-family="system-ui, sans-serif" font-size="12" fill="#6b7280">(negate filter)</text><text x="680" y="580" font-family="SF Mono, Consolas, monospace" font-size="12" fill="#06b6d4">sym:</text><text x="720" y="580" font-family="SF Mono, Consolas, monospace" font-size="12" fill="#1f2937">main</text><text x="760" y="580" font-family="system-ui, sans-serif" font-size="12" fill="#6b7280">(symbol definitions)</text><text x="680" y="605" font-family="SF Mono, Consolas, monospace" font-size="12" fill="#06b6d4">content:</text><text x="740" y="605" font-family="SF Mono, Consolas, monospace" font-size="12" fill="#1f2937">README</text><text x="805" y="605" font-family="system-ui, sans-serif" font-size="12" fill="#6b7280">(search content only)</text><path stroke="#374151" d="M200 640h800"/><text x="600" y="670" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">View full query syntax documentation →</text></svg>
