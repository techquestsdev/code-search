<svg viewBox="0 0 560 400"
  xmlns="http://www.w3.org/2000/svg">
  <!-- Terminal window - matching og-image colors -->
  <rect width="560" height="400" rx="12" fill="#111827" stroke="#374151" stroke-width="1"/>

  <!-- Terminal header -->
  <rect width="560" height="44" rx="12" fill="#1f2937"/>
  <rect y="32" width="560" height="12" fill="#1f2937"/>

  <!-- Traffic lights -->
  <circle cx="22" cy="22" r="7" fill="#ff5f56"/>
  <circle cx="46" cy="22" r="7" fill="#ffbd2e"/>
  <circle cx="70" cy="22" r="7" fill="#27c93f"/>

  <!-- Terminal title -->
  <text x="280" y="27" font-family="SF Mono, Monaco, monospace" font-size="13" fill="#6b7280" text-anchor="middle">Terminal</text>

  <!-- Command prompt -->
  <text x="22" y="80" font-family="SF Mono, Monaco, monospace" font-size="14" fill="#27c93f">$</text>
  <text x="38" y="80" font-family="SF Mono, Monaco, monospace" font-size="14" fill="#f9fafb">code-search search handleRequest --repos myorg -n 3</text>

  <!-- Config file message -->
  <text x="22" y="108" font-family="SF Mono, Monaco, monospace" font-size="12" fill="#6b7280">Using config file: ~/.code-search.yaml</text>

  <!-- Result 1: repo and file header -->
  <text x="22" y="144" font-family="SF Mono, Monaco, monospace" font-size="14" fill="#27c93f">myorg/api-gateway</text>
  <text x="188" y="144" font-family="SF Mono, Monaco, monospace" font-size="14" fill="#60a5fa">src/handlers/request.go</text>

  <!-- Line with match -->
  <text x="30" y="168" font-family="SF Mono, Monaco, monospace" font-size="13" fill="#6b7280">42 │</text>
  <text x="72" y="168" font-family="SF Mono, Monaco, monospace" font-size="13" fill="#9ca3af">func </text>
  <text x="112" y="168" font-family="SF Mono, Monaco, monospace" font-size="13" fill="#fbbf24" font-weight="bold">handleRequest</text>
  <text x="220" y="168" font-family="SF Mono, Monaco, monospace" font-size="13" fill="#9ca3af">(ctx context.Context) {</text>

  <!-- Result 2: repo and file header -->
  <text x="22" y="208" font-family="SF Mono, Monaco, monospace" font-size="14" fill="#27c93f">myorg/web-frontend</text>
  <text x="196" y="208" font-family="SF Mono, Monaco, monospace" font-size="14" fill="#60a5fa">lib/api/client.ts</text>

  <!-- Line with match -->
  <text x="30" y="232" font-family="SF Mono, Monaco, monospace" font-size="13" fill="#6b7280">88 │</text>
  <text x="72" y="232" font-family="SF Mono, Monaco, monospace" font-size="13" fill="#c084fc">async </text>
  <text x="120" y="232" font-family="SF Mono, Monaco, monospace" font-size="13" fill="#fbbf24" font-weight="bold">handleRequest</text>
  <text x="228" y="232" font-family="SF Mono, Monaco, monospace" font-size="13" fill="#9ca3af">(req: Request) {</text>

  <!-- Result 3: repo and file header -->
  <text x="22" y="272" font-family="SF Mono, Monaco, monospace" font-size="14" fill="#27c93f">myorg/auth-service</text>
  <text x="192" y="272" font-family="SF Mono, Monaco, monospace" font-size="14" fill="#60a5fa">pkg/http/middleware.go</text>

  <!-- Line with match -->
  <text x="30" y="296" font-family="SF Mono, Monaco, monospace" font-size="13" fill="#6b7280">15 │</text>
  <text x="72" y="296" font-family="SF Mono, Monaco, monospace" font-size="13" fill="#9ca3af">func </text>
  <text x="112" y="296" font-family="SF Mono, Monaco, monospace" font-size="13" fill="#fbbf24" font-weight="bold">handleRequest</text>
  <text x="220" y="296" font-family="SF Mono, Monaco, monospace" font-size="13" fill="#9ca3af">(w http.ResponseWriter) {</text>

  <!-- Summary line -->
  <text x="22" y="336" font-family="SF Mono, Monaco, monospace" font-size="13" fill="#f9fafb">156 matches</text>
  <text x="116" y="336" font-family="SF Mono, Monaco, monospace" font-size="13" fill="#6b7280">in</text>
  <text x="140" y="336" font-family="SF Mono, Monaco, monospace" font-size="13" fill="#22c55e">1.203ms</text>

  <!-- Blinking cursor -->
  <text x="22" y="372" font-family="SF Mono, Monaco, monospace" font-size="14" fill="#27c93f">$</text>
  <rect x="38" y="358" width="10" height="18" fill="#27c93f">
    <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>
